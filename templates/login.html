<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <!-- Tailwind CSS CDN for easy styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom font for a modern look */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">
  <!-- Login Box Container -->
  <div class="login-box bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-sm border border-gray-700">
    <h2 class="text-3xl font-bold text-center mb-6 text-white">Login</h2>
    <form class="space-y-4">
      <!-- Username Input -->
      <input
        type="text"
        placeholder="Username"
        required
        class="w-full p-3 bg-gray-700 text-white border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400"
      >
      <!-- Password Input -->
      <input
        type="password"
        placeholder="Password"
        required
        class="w-full p-3 bg-gray-700 text-white border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400"
      >
      <!-- Login Button -->
      <button
        type="submit"
        class="w-full p-3 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition duration-300 ease-in-out shadow-md"
      >
        Login
      </button>
    </form>
    <!-- Separator or "or" text -->
    <div class="text-center text-gray-400 my-6">
      Or
    </div>
    <!-- Login with Vector Button -->
    <a
      href="vector"
      class="w-full block text-center p-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition duration-300 ease-in-out shadow-md"
    >
      Login with Vector
    </a>
  </div>
</body>
</html>
